[package]
name = "geo-file-loader"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
bytes = { workspace = true }
time-logger = { path = "../time-logger" }
thiserror = "1"
# geojson = { version = "0.24", features = ["geo-traits"] }
