[workspace]
authors = ["Kyle Barron <kyle@developmentseed.org>"]
channels = ["conda-forge"]
name = "geotiff-test-data"
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]
version = "0.1.0"

[tasks]
generate = "python -m rasterio_generated.cli"
info = "bash scripts/info.sh"
check = "bash scripts/check.sh"

[dependencies]
gdal = ">=3.12.1,<4"
ipykernel = ">=7.1.0,<8"
numpy = ">=2.4.1,<3"
python = ">=3.12"
rasterio = ">=1.5.0,<2"
affine = ">=2.4.0,<3"

[pypi-dependencies]
rio-cogeo = ">=7.0.1, <8"
